name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Lấy mã nguồn từ GitHub
        uses: actions/checkout@v4

      - name: Cài đặt Godot 4.7.1 & Export Templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          use-dotnet: false
          export-templates: true

      - name: Tạo thư mục build
        run: mkdir -p build/ios

      - name: Xuất dự án Xcode từ Godot
        run: godot --headless --export-release "iOS" build/ios/Kieuu.xcodeproj

      - name: Build Xcode Project
        run: |
          cd build/ios
          xcodebuild build \
            -project "Kieuu.xcodeproj" \
            -scheme "Kieuu" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="$(pwd)/AppBuild"

      - name: Đóng gói thành file .ipa
        run: |
          cd build/ios
          mkdir -p Payload
          mv AppBuild/*.app Payload/
          zip -r Kieuu.ipa Payload

      - name: Lưu file IPA để tải về
        uses: actions/upload-artifact@v4
        with:
          name: Kieuu-iOS-IPA
          path: build/ios/Kieuu.ipa
