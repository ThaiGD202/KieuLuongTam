name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Lấy mã nguồn từ GitHub
        uses: actions/checkout@v4

      - name: Build Xcode Project (Kieuu.xcodeproj)
        run: |
          xcodebuild build \
            -project "Kieuu.xcodeproj" \
            -scheme "Kieuu" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="$(pwd)/build/AppBuild"

      - name: Đóng gói thành file .ipa
        run: |
          mkdir -p build/Payload
          mv build/AppBuild/*.app build/Payload/
          cd build
          zip -r Kieuu.ipa Payload

      - name: Lưu file IPA để tải về
        uses: actions/upload-artifact@v4
        with:
          name: Kieuu-iOS-IPA
          path: build/Kieuu.ipa
